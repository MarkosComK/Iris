<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e0c0a">
<title>Nosso Wrapped · eu & vc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0c0a; --surface:#161410;
    --gold:#c9a84c; --gold-light:#e8c97a;
    --rose:#c46b8a; --rose-light:#e89cb5;
    --teal:#4a9e8a; --teal-light:#7ecfbc;
    --ink:#efe9dd; --muted:#9a9183;
    --serif:'Cormorant Garamond',serif;
    --mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);}
  body{font-family:var(--mono);font-weight:300;}

  /* ---------- deck / scroll-snap ---------- */
  #deck{
    height:100dvh;width:100%;overflow-y:scroll;
    scroll-snap-type:y mandatory;scroll-behavior:smooth;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  #deck::-webkit-scrollbar{display:none;}
  .card{
    height:100dvh;width:100%;scroll-snap-align:start;scroll-snap-stop:always;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:72px 28px 88px;position:relative;overflow:hidden;
  }
  .card-inner{max-width:560px;width:100%;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:2;}

  /* tint variants */
  .t-gold{background:radial-gradient(120% 90% at 50% 18%,rgba(201,168,76,.16),transparent 60%),var(--bg);}
  .t-rose{background:radial-gradient(120% 90% at 50% 18%,rgba(196,107,138,.18),transparent 60%),var(--bg);}
  .t-teal{background:radial-gradient(120% 90% at 50% 18%,rgba(74,158,138,.16),transparent 60%),var(--bg);}
  .t-deep{background:radial-gradient(140% 100% at 50% 50%,rgba(196,107,138,.10),transparent 55%),linear-gradient(180deg,#15100f,#0e0c0a);}

  /* ---------- typography ---------- */
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);font-weight:400;}
  .kicker.gold{color:var(--gold-light);} .kicker.rose{color:var(--rose-light);} .kicker.teal{color:var(--teal-light);}
  .big{font-family:var(--serif);font-weight:500;line-height:.92;letter-spacing:-.01em;
       font-size:clamp(68px,22vw,150px);}
  .big.gold{color:var(--gold-light);} .big.rose{color:var(--rose-light);} .big.teal{color:var(--teal-light);}
  .headline{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(26px,7vw,40px);line-height:1.12;color:var(--ink);}
  .headline em{font-style:normal;}
  .lede{font-family:var(--serif);font-size:clamp(19px,5vw,25px);line-height:1.4;color:var(--ink);font-weight:300;}
  .sub{font-size:13px;letter-spacing:.04em;color:var(--muted);line-height:1.6;max-width:44ch;}
  .unit{font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .gold-t{color:var(--gold-light);} .rose-t{color:var(--rose-light);} .teal-t{color:var(--teal-light);}

  /* reveal animation */
  .reveal{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.2,1);}
  .card.in .reveal{opacity:1;transform:none;}
  .card.in .reveal.d1{transition-delay:.10s;}
  .card.in .reveal.d2{transition-delay:.22s;}
  .card.in .reveal.d3{transition-delay:.36s;}
  .card.in .reveal.d4{transition-delay:.50s;}
  .card.in .reveal.d5{transition-delay:.64s;}

  /* ---------- versus bars ---------- */
  .vs{width:100%;display:flex;flex-direction:column;gap:16px;margin-top:6px;}
  .vrow{text-align:left;}
  .vlab{display:flex;justify-content:space-between;font-size:13px;letter-spacing:.06em;margin-bottom:6px;}
  .vlab .nm{font-family:var(--mono);font-weight:400;}
  .vlab .vv{font-family:var(--serif);font-size:20px;}
  .vtrack{height:13px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden;}
  .vfill{height:100%;width:0;border-radius:8px;transition:width 1.1s cubic-bezier(.2,.7,.2,1);transition-delay:.25s;}
  .vfill.gold{background:linear-gradient(90deg,var(--gold),var(--gold-light));}
  .vfill.rose{background:linear-gradient(90deg,var(--rose),var(--rose-light));}

  /* ---------- bar chart ---------- */
  .chart{width:100%;display:flex;align-items:flex-end;justify-content:center;gap:3px;height:190px;margin-top:8px;}
  .bar{flex:1;max-width:22px;background:linear-gradient(180deg,var(--teal-light),var(--teal));border-radius:4px 4px 0 0;height:0;transition:height .9s cubic-bezier(.2,.7,.2,1);position:relative;}
  .card.in .bar{height:var(--h);}
  .chart.rose .bar{background:linear-gradient(180deg,var(--rose-light),var(--rose));}
  .chart.gold .bar{background:linear-gradient(180deg,var(--gold-light),var(--gold));}
  .bar.peak{box-shadow:0 0 14px rgba(232,201,122,.5);}
  .xaxis{width:100%;display:flex;justify-content:space-between;font-size:10px;letter-spacing:.05em;color:var(--muted);margin-top:8px;}

  /* monthly */
  .months{width:100%;display:flex;gap:10px;justify-content:center;align-items:flex-end;height:200px;margin-top:6px;}
  .mcol{flex:1;max-width:80px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:8px;}
  .mbar{width:100%;background:linear-gradient(180deg,var(--rose-light),var(--rose));border-radius:7px 7px 0 0;height:0;transition:height 1s cubic-bezier(.2,.7,.2,1);}
  .card.in .mbar{height:var(--h);}
  .mname{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .mval{font-family:var(--serif);font-size:17px;color:var(--ink);}

  /* tz toggle */
  .toggle{display:inline-flex;border:1px solid rgba(255,255,255,.14);border-radius:30px;overflow:hidden;margin-top:4px;}
  .toggle button{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:none;padding:8px 16px;cursor:pointer;transition:.25s;}
  .toggle button.on{background:var(--teal);color:#0e0c0a;}

  /* emoji */
  .emoji-hero{font-size:clamp(80px,26vw,150px);line-height:1;filter:drop-shadow(0 6px 20px rgba(0,0,0,.5));}
  .emoji-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:30px;}
  .epair{display:flex;gap:34px;width:100%;justify-content:center;margin-top:6px;}
  .ecol{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .ecol .who{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;}
  .ecol .ems{font-size:27px;letter-spacing:4px;}

  /* word cloud */
  .cloud{display:flex;flex-wrap:wrap;gap:2px 16px;justify-content:center;align-items:center;align-content:center;max-width:600px;margin-top:6px;}
  .cloud span{font-family:var(--serif);line-height:.9;}

  /* final letter */
  .letter{font-family:var(--serif);font-style:italic;font-weight:300;font-size:clamp(19px,5.2vw,26px);line-height:1.45;color:var(--ink);max-width:30ch;}
  .letter-end{font-family:var(--serif);font-size:clamp(28px,8vw,40px);color:var(--rose-light);margin-top:10px;}

  /* media grid */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;margin-top:6px;}
  .mtile{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 14px;text-align:center;}
  .mtile .n{font-family:var(--serif);font-size:34px;color:var(--gold-light);line-height:1;}
  .mtile .l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:8px;}

  /* quote / first message */
  .quote{background:var(--surface);border:1px solid rgba(196,107,138,.25);border-left:3px solid var(--rose);border-radius:14px;padding:22px 22px;text-align:left;max-width:480px;}
  .quote .qt{font-family:var(--serif);font-style:italic;font-size:22px;line-height:1.4;color:var(--ink);}
  .quote .qm{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--muted);margin-top:14px;text-transform:uppercase;}

  /* progress dots */
  #progress{position:fixed;top:0;left:0;right:0;display:flex;gap:4px;padding:12px 14px;z-index:50;pointer-events:none;}
  #progress .seg{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.16);overflow:hidden;}
  #progress .seg i{display:block;height:100%;width:0;background:var(--ink);transition:width .3s;}
  #progress .seg.done i{width:100%;}
  #progress .seg.cur i{width:100%;background:var(--gold-light);}

  /* hint */
  .hint{position:absolute;bottom:30px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:11px;letter-spacing:.18em;text-transform:uppercase;z-index:3;}
  .hint .chev{font-size:20px;animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(7px);opacity:1;}}
  .card:not(.in) .hint{opacity:0;}

  /* floating hearts on cover/outro */
  .floaty{position:absolute;inset:0;overflow:hidden;z-index:1;pointer-events:none;}
  .floaty span{position:absolute;bottom:-40px;color:var(--rose);opacity:0;animation:rise linear infinite;}
  @keyframes rise{0%{transform:translateY(0) scale(.7);opacity:0;}10%{opacity:.7;}90%{opacity:.5;}100%{transform:translateY(-115dvh) scale(1.1);opacity:0;}}

  .heartline{font-size:26px;letter-spacing:6px;}
  .divider{width:46px;height:1px;background:rgba(255,255,255,.18);margin:4px 0;}
  .pulse{animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
</style>
</head>
<body>
<div id="progress"></div>
<div id="deck"></div>

<script src="data.js"></script>
<script>
const NF = n => n.toLocaleString('pt-BR');
const PT_MONTH = {'01':'Jan','02':'Fev','03':'Mar','04':'Abr','05':'Mai','06':'Jun','07':'Jul','08':'Ago','09':'Set','10':'Out','11':'Nov','12':'Dez'};
function prettyDate(iso){const[d]=iso.split('T');const[y,m,day]=d.split('-');return `${+day} de ${({1:'janeiro',2:'fevereiro',3:'março',4:'abril',5:'maio',6:'junho',7:'julho',8:'agosto',9:'setembro',10:'outubro',11:'novembro',12:'dezembro'})[+m]} de ${y}`;}
function fmtDur(s){if(s<60)return s+'s';const m=Math.floor(s/60);const r=s%60;return r?`${m}min ${r}s`:`${m}min`;}

function build(){
  const D = window.WRAPPED;
  const deck = document.getElementById('deck');
  const NM = {markos:'eu', iris:'vc'};
  const cards = [];

  /* 1 — cover */
  cards.push(`
  <div class="card t-deep" data-floaty="1">
    <div class="card-inner">
      <p class="kicker rose reveal">eu & vc</p>
      <h1 class="big rose reveal d1" style="font-size:clamp(46px,13vw,84px);font-style:italic">Nosso<br>Wrapped</h1>
      <div class="divider reveal d2"></div>
      <p class="lede reveal d2">${prettyDate(D.range.first)} a ${prettyDate(D.range.last)}</p>
      <p class="sub reveal d3">Tudo o que a gente falou, contado em números. Deslize pra cima 💛</p>
      <p class="heartline reveal d4" style="margin-top:10px">♡ ♥ ♡</p>
    </div>
    <div class="hint"><span>deslize</span><span class="chev">⌄</span></div>
  </div>`);

  /* 2 — total messages */
  cards.push(`
  <div class="card t-rose">
    <div class="card-inner">
      <p class="kicker rose reveal">Em ${D.totals.span_days} dias, a gente trocou</p>
      <div class="big rose reveal d1 countup" data-to="${D.totals.messages}">0</div>
      <p class="unit reveal d1">mensagens</p>
      <p class="lede reveal d2" style="margin-top:14px">São <em class="rose-t">${NF(D.totals.avg_per_day)}</em> por dia. Sem pular <em class="rose-t">um único dia</em>.</p>
      <p class="sub reveal d3">E ainda tem mais ${NF(D.media.total)} mídias (áudios, fotos e figurinhas) que nem entram nessa conta.</p>
    </div>
  </div>`);

  /* 3 — words */
  cards.push(`
  <div class="card t-gold">
    <div class="card-inner">
      <p class="kicker gold reveal">Só de texto, nós escrevemos</p>
      <div class="big gold reveal d1 countup" data-to="${D.totals.words_total}">0</div>
      <p class="unit reveal d1">palavras</p>
      <p class="lede reveal d2" style="margin-top:14px">Pra ter ideia, “Assim Falou Zaratustra” do Nietzsche tem umas 100 mil palavras em quase 350 páginas. Ou seja, nós dois já escrevemos o <em class="gold-t">nosso próprio clássico</em>.</p>
    </div>
  </div>`);

  /* 4 — who talks more */
  const mk=D.totals.by_person.markos, ir=D.totals.by_person.iris, mx=Math.max(mk,ir);
  cards.push(`
  <div class="card t-deep">
    <div class="card-inner">
      <p class="kicker reveal">Quem fala mais?</p>
      <h2 class="headline reveal d1">O placar das <em>mensagens</em></h2>
      <div class="vs reveal d2">
        <div class="vrow"><div class="vlab"><span class="nm gold-t">Eu</span><span class="vv gold-t">${NF(mk)}</span></div><div class="vtrack"><div class="vfill gold" data-w="${mk/mx*100}"></div></div></div>
        <div class="vrow"><div class="vlab"><span class="nm rose-t">vc</span><span class="vv rose-t">${NF(ir)}</span></div><div class="vtrack"><div class="vfill rose" data-w="${ir/mx*100}"></div></div></div>
      </div>
      <p class="sub reveal d3">Parece que se o amor fosse mensagem eu tenho mais, XD (${NF(Math.abs(mk-ir))} a mais)... ou é que eu picoto mais as mensagens antes de mandar ahahah</p>
    </div>
  </div>`);

  /* 5 — streak */
  cards.push(`
  <div class="card t-rose">
    <div class="card-inner">
      <p class="kicker rose reveal">A maior sequência</p>
      <div class="big rose reveal d1 countup" data-to="${D.streak.days}">0</div>
      <p class="unit reveal d1">dias seguidos</p>
      <p class="lede reveal d2" style="margin-top:14px">De ${prettyDate(D.streak.start)} até hoje: <em class="rose-t">nenhum dia em branco</em>. Todo santo dia teve um “oi”.</p>
    </div>
  </div>`);

  /* 6 — busiest day */
  cards.push(`
  <div class="card t-teal">
    <div class="card-inner">
      <p class="kicker teal reveal">O dia mais intenso</p>
      <h2 class="headline reveal d1" style="color:var(--teal-light)">${prettyDate(D.busiest_day.date)}</h2>
      <div class="big teal reveal d2 countup" data-to="${D.busiest_day.count}">0</div>
      <p class="unit reveal d2">mensagens em 24h</p>
      <p class="sub reveal d3">Digamos que esse dia foi bem intenso pra nós dois. Vc usou bastante nosso brinquedo novo 😏</p>
    </div>
  </div>`);

  /* 7 — when we talk (hourly, tz toggle) */
  cards.push(`
  <div class="card t-teal">
    <div class="card-inner">
      <p class="kicker teal reveal">A que horas a gente conversa</p>
      <h2 class="headline reveal d1">O ritmo dos <em>dias</em></h2>
      <div class="toggle reveal d2" id="tztoggle">
        <button data-tz="markos" class="on">Meu horário</button>
        <button data-tz="iris">Seu horário</button>
      </div>
      <div class="chart teal reveal d2" id="hourchart"></div>
      <div class="xaxis reveal d2"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>
      <p class="sub reveal d3" id="hournote"></p>
    </div>
  </div>`);

  /* 8 — by month */
  const months=Object.entries(D.by_month), mmax=Math.max(...months.map(m=>m[1]));
  cards.push(`
  <div class="card t-rose">
    <div class="card-inner">
      <p class="kicker rose reveal">Mês a mês</p>
      <h2 class="headline reveal d1">Quanto a gente <em>conversou</em></h2>
      <div class="months reveal d2">
        ${months.map(([k,v])=>`<div class="mcol"><div class="mval">${NF(v)}</div><div class="mbar" style="--h:${Math.max(v/mmax*100,4)}%"></div><div class="mname">${PT_MONTH[k.split('-')[1]]}</div></div>`).join('')}
      </div>
      <p class="sub reveal d3">Junho mal começou e a conta já não parou.</p>
    </div>
  </div>`);

  /* 9 — romantic words */
  const ta=D.romantic.te_amo, am=D.romantic.amor;
  cards.push(`
  <div class="card t-rose">
    <div class="card-inner">
      <p class="kicker rose reveal">As palavras que mais importam</p>
      <div class="big rose reveal d1 countup" data-to="${ta.markos+ta.iris}">0</div>
      <p class="unit reveal d1">vezes “te amo”</p>
      <p class="lede reveal d2" style="margin-top:10px">E <em class="rose-t">${NF(am.markos+am.iris)}</em> vezes a palavra “amor”.</p>
      <div class="vs reveal d3" style="margin-top:14px">
        <div class="vrow"><div class="vlab"><span class="nm gold-t">Eu disse “te amo”</span><span class="vv gold-t">${ta.markos}×</span></div><div class="vtrack"><div class="vfill gold" data-w="${ta.markos/Math.max(ta.markos,ta.iris)*100}"></div></div></div>
        <div class="vrow"><div class="vlab"><span class="nm rose-t">vc disse “te amo”</span><span class="vv rose-t">${ta.iris}×</span></div><div class="vtrack"><div class="vfill rose" data-w="${ta.iris/Math.max(ta.markos,ta.iris)*100}"></div></div></div>
      </div>
    </div>
  </div>`);

  /* 10 — hearts */
  const hm=D.emojis.hearts.markos, hi=D.emojis.hearts.iris;
  cards.push(`
  <div class="card t-rose" data-floaty="1">
    <div class="card-inner">
      <p class="kicker rose reveal">A chuva de corações ❤</p>
      <h2 class="headline reveal d1">Quem manda mais <em>coraçãozinho</em></h2>
      <div class="vs reveal d2">
        <div class="vrow"><div class="vlab"><span class="nm rose-t">vc</span><span class="vv rose-t">${NF(hi)} ❤</span></div><div class="vtrack"><div class="vfill rose" data-w="${hi/Math.max(hm,hi)*100}"></div></div></div>
        <div class="vrow"><div class="vlab"><span class="nm gold-t">Eu</span><span class="vv gold-t">${NF(hm)} ❤</span></div><div class="vtrack"><div class="vfill gold" data-w="${hm/Math.max(hm,hi)*100}"></div></div></div>
      </div>
      <p class="sub reveal d3">${hi>hm?`vc manda ${(hi/Math.max(hm,1)).toFixed(0)}× mais coração que eu. Eu compenso nas palavras, né hehe.`:'Empate técnico de amor.'}</p>
    </div>
  </div>`);

  /* 11 — emojis */
  const topE=D.emojis.top[0];
  cards.push(`
  <div class="card t-gold">
    <div class="card-inner">
      <p class="kicker gold reveal">O nosso emoji</p>
      <div class="emoji-hero reveal d1 pulse">${topE[0]}</div>
      <p class="lede reveal d2">Usado <em class="gold-t">${NF(topE[1])}</em> vezes, o xodó oficial do nosso chat.</p>
      <div class="epair reveal d3">
        <div class="ecol"><span class="who gold-t">Eu</span><span class="ems">${D.emojis.markos.slice(0,4).map(e=>e[0]).join(' ')}</span></div>
        <div class="ecol"><span class="who rose-t">vc</span><span class="ems">${D.emojis.iris.slice(0,4).map(e=>e[0]).join(' ')}</span></div>
      </div>
    </div>
  </div>`);

  /* 12 — media */
  const M=D.media.by_type;
  cards.push(`
  <div class="card t-teal">
    <div class="card-inner">
      <p class="kicker teal reveal">Além das palavras</p>
      <h2 class="headline reveal d1">${NF(D.media.total)} <em>mídias</em> trocadas</h2>
      <div class="mgrid reveal d2">
        <div class="mtile"><div class="n">${NF(M.audio||0)}</div><div class="l">áudios 🎙️</div></div>
        <div class="mtile"><div class="n">${NF(M.sticker||0)}</div><div class="l">figurinhas</div></div>
        <div class="mtile"><div class="n">${NF(M.image||0)}</div><div class="l">fotos 📷</div></div>
        <div class="mtile"><div class="n">${NF(M.video||0)}</div><div class="l">vídeos 🎬</div></div>
      </div>
      <p class="sub reveal d3">${NF(M.audio||0)} áudios é gente que gosta de ouvir a voz um do outro.</p>
    </div>
  </div>`);

  /* 13 — madrugada */
  const mad=D.madrugada.markos+D.madrugada.iris;
  cards.push(`
  <div class="card t-deep">
    <div class="card-inner">
      <p class="kicker reveal">Altas horas 🌙</p>
      <div class="big rose reveal d1 countup" data-to="${mad}">0</div>
      <p class="unit reveal d1">mensagens de madrugada</p>
      <p class="lede reveal d2" style="margin-top:12px">Entre meia-noite e 5h da manhã. Sono é pra quem não tá apaixonado.</p>
      <p class="sub reveal d3">Eu: ${NF(D.madrugada.markos)} · vc: ${NF(D.madrugada.iris)} (no meu horário, UTC+1)</p>
    </div>
  </div>`);

  /* 14 — reply speed */
  cards.push(`
  <div class="card t-gold">
    <div class="card-inner">
      <p class="kicker gold reveal">Ninguém fica no vácuo</p>
      <h2 class="headline reveal d1">Tempo de <em>resposta</em></h2>
      <div class="epair reveal d2" style="margin-top:8px">
        <div class="ecol"><span class="who gold-t">Eu respondo em</span><span class="vv" style="font-family:var(--serif);font-size:40px;color:var(--gold-light)">${fmtDur(D.response_seconds.markos_median)}</span></div>
        <div class="ecol"><span class="who rose-t">vc responde em</span><span class="vv" style="font-family:var(--serif);font-size:40px;color:var(--rose-light)">${fmtDur(D.response_seconds.iris_median)}</span></div>
      </div>
      <p class="sub reveal d3" style="margin-top:14px">Mediana de resposta quando um escreve depois do outro. Praticamente tempo real.</p>
    </div>
  </div>`);

  /* 15 — first message */
  const fm=D.range.first_message;
  cards.push(`
  <div class="card t-deep">
    <div class="card-inner">
      <p class="kicker rose reveal">Onde tudo começou</p>
      <h2 class="headline reveal d1">A <em>primeira</em> mensagem</h2>
      <div class="quote reveal d2">
        <div class="qt">“${fm.text.replace(/</g,'&lt;')}”</div>
        <div class="qm">${NM[fm.sender]}, ${prettyDate(fm.dt)}</div>
      </div>
      <p class="sub reveal d3">${NF(D.totals.messages)} mensagens depois, ainda tem assunto.</p>
    </div>
  </div>`);

  /* 16 — word cloud */
  const wc=D.words_top.slice(0,26), wmax=wc[0][1];
  const palette=['var(--gold-light)','var(--rose-light)','var(--teal-light)','var(--ink)'];
  cards.push(`
  <div class="card t-deep">
    <div class="card-inner">
      <p class="kicker reveal">O nosso vocabulário</p>
      <h2 class="headline reveal d1">As palavras que <em>mais repetem</em></h2>
      <div class="cloud reveal d2">
        ${wc.map((w,i)=>{const r=w[1]/wmax;const sz=Math.round(15+r*73);const wt=r>0.45?500:r>0.18?400:300;return `<span style="font-size:${sz}px;font-weight:${wt};line-height:.9;color:${palette[i%palette.length]}">${w[0]}</span>`;}).join('')}
      </div>
    </div>
  </div>`);

  /* 17 — outro */
  cards.push(`
  <div class="card t-rose" data-floaty="2">
    <div class="card-inner">
      <p class="kicker rose reveal">12 de junho</p>
      <h2 class="headline reveal d1" style="font-size:clamp(30px,8vw,46px)">Feliz <em class="rose-t">Dia dos<br>Namorados</em></h2>
      <div class="divider reveal d2"></div>
      <p class="lede reveal d2">${NF(D.totals.messages)} mensagens, ${NF(D.romantic.te_amo.markos+D.romantic.te_amo.iris)} “te amo”, e isso é só o começo da nossa conta.</p>
      <p class="heartline reveal d3" style="margin-top:8px">♥</p>
      <p class="sub reveal d4">deixei uma última coisa pra te dizer. desliza mais uma vez 💛</p>
    </div>
  </div>`);

  /* 18 — mensagem final */
  cards.push(`
  <div class="card t-deep" data-floaty="2">
    <div class="card-inner">
      <p class="kicker rose reveal">pra você, Iris</p>
      <p class="letter reveal d1">Entre o corpo e a consciência reside algo inexplicável; e nesse espaço, reside você. A alma.</p>
      <p class="letter reveal d2">Nela, mesmo sem compreender, sei que há você abraçando a sua com a minha.</p>
      <p class="letter reveal d3">A incompreensão faz total sentido, porque você vai além do que qualquer palavra consegue alcançar.</p>
      <p class="letter-end reveal d4">Te amo.</p>
    </div>
  </div>`);

  deck.innerHTML = cards.join('');

  /* progress bar segments */
  const prog=document.getElementById('progress');
  const all=[...deck.querySelectorAll('.card')];
  prog.innerHTML=all.map(()=>'<div class="seg"><i></i></div>').join('');
  const segs=[...prog.children];

  /* floaty hearts */
  deck.querySelectorAll('[data-floaty]').forEach(c=>{
    const n=c.dataset.floaty==='2'?18:12;const f=document.createElement('div');f.className='floaty';
    for(let i=0;i<n;i++){const s=document.createElement('span');s.textContent=Math.random()>.5?'♥':'♡';
      s.style.left=Math.random()*100+'%';s.style.fontSize=(12+Math.random()*22)+'px';
      s.style.animationDuration=(7+Math.random()*7)+'s';s.style.animationDelay=(Math.random()*8)+'s';f.appendChild(s);}
    c.prepend(f);
  });

  /* intersection: reveal + countups + bars + progress */
  const io=new IntersectionObserver((ents)=>{
    ents.forEach(e=>{
      const idx=all.indexOf(e.target);
      if(e.isIntersecting && e.intersectionRatio>0.6){
        e.target.classList.add('in');
        runCountups(e.target);
        e.target.querySelectorAll('.vfill').forEach(v=>v.style.width=v.dataset.w+'%');
        segs.forEach((s,i)=>{s.classList.toggle('done',i<idx);s.classList.toggle('cur',i===idx);});
      }
    });
  },{threshold:[0,0.6,1]});
  all.forEach(c=>io.observe(c));
  all[0].classList.add('in');runCountups(all[0]);
  segs[0].classList.add('cur');

  /* hourly chart + tz toggle */
  renderHours('markos');
  document.getElementById('tztoggle').addEventListener('click',ev=>{
    const b=ev.target.closest('button');if(!b)return;
    [...ev.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
    renderHours(b.dataset.tz);
  });
  function renderHours(tz){
    const arr=tz==='iris'?D.hour_iris:D.hour_markos;
    const hmax=Math.max(...arr), peak=arr.indexOf(hmax);
    document.getElementById('hourchart').innerHTML=arr.map((v,h)=>
      `<div class="bar ${h===peak?'peak':''}" style="--h:${Math.max(v/hmax*100,3)}%"></div>`).join('');
    const tzlab=tz==='iris'?'no seu horário (Brasil, UTC-3)':'no meu horário (UTC+1)';
    document.getElementById('hournote').textContent=`Pico às ${peak}h ${tzlab}. A gente fica a 4h de distância e mesmo assim tá sempre online junto.`;
  }

  function runCountups(card){
    card.querySelectorAll('.countup').forEach(el=>{
      if(el.dataset.done)return;el.dataset.done='1';
      const to=+el.dataset.to;const dur=1100;const t0=performance.now();
      (function tick(now){const p=Math.min((now-t0)/dur,1);const e=1-Math.pow(1-p,3);
        el.textContent=NF(Math.round(to*e));if(p<1)requestAnimationFrame(tick);})(t0);
    });
  }

  /* keyboard nav */
  window.addEventListener('keydown',e=>{
    const h=window.innerHeight;
    if(e.key==='ArrowDown'||e.key===' ')deck.scrollBy({top:h,behavior:'smooth'});
    if(e.key==='ArrowUp')deck.scrollBy({top:-h,behavior:'smooth'});
  });
}

/* auto-init: usa data.js se presente, senão tenta fetch do json */
(function(){
  if(window.WRAPPED){ build(); return; }
  fetch('data.json').then(r=>r.json()).then(d=>{window.WRAPPED=d;build();})
    .catch(()=>{document.getElementById('deck').innerHTML='<div class="card t-rose"><div class="card-inner"><p class="lede">Rode <b>python3 parse.py</b> primeiro pra gerar os dados 💛</p></div></div>';});
})();
</script>
</body>
</html>
